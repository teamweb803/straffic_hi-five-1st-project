server:
  address: 0.0.0.0
  port: 8585

spring:
  datasource:
    url: ${HIFIVE_DB_URL:jdbc:postgresql://localhost:5433/hifive}
    username: ${HIFIVE_DB_USERNAME:pgadmin}
    password: ${HIFIVE_DB_PASSWORD:1004}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
