syntax = "proto3";

package hifive.tolling.v1;

option java_multiple_files = true;
option java_package = "com.hifive.tolling.grpc";
option java_outer_classname = "TollingProto";

import "google/protobuf/timestamp.proto";

// =====================================================================
// hifive - Edge(FastAPI)  ->  Backend(Spring Boot) 전송 계약 정의
// 모든 통과 이벤트는 Protobuf 바이너리로 직렬화되어 gRPC로 전송된다.
// JSON 대비 페이로드 크기 60~80% 절감, 파싱 비용 감소가 목표.
// =====================================================================

service TollingEventService {
  // 단건 통과 이벤트 전송 (저신뢰도/검수 케이스, 보정 재전송용)
  rpc SendPassageEvent (PassageEventRequest) returns (PassageEventResponse);

  // 실시간 통과 이벤트 양방향 스트리밍 (정상 운영 채널)
  rpc StreamPassageEvents (stream PassageEventRequest)
      returns (stream PassageEventResponse);

  // 엣지 노드 헬스체크 (백엔드가 엣지 상태를 추적)
  rpc Heartbeat (HeartbeatRequest) returns (HeartbeatResponse);
}

// ---------------- 차량 통과 이벤트 ----------------
message PassageEventRequest {
  string event_id          = 1;  // UUIDv4, 멱등성 보장 키
  string edge_node_id      = 2;  // 엣지 식별자 (예: "EDGE-SEOUL-01")
  string lane_id           = 3;  // 차로 ID
  string plate             = 4;  // 인식 번호판 텍스트
  float  plate_confidence  = 5;  // 0.0 ~ 1.0
  VehicleType vehicle_type = 6;
  CrossingDirection direction = 7;
  google.protobuf.Timestamp captured_at = 8;
  GpsPoint gps             = 9;
  bytes  plate_roi_jpeg    = 10; // 검수용 ROI 썸네일 (선택)
  TrackInfo track          = 11; // 트래킹 메타정보
}

message TrackInfo {
  uint64 track_id        = 1; // YOLO/OpenCV 트래커 부여 ID
  uint32 frame_index     = 2;
  float  bbox_x          = 3;
  float  bbox_y          = 4;
  float  bbox_w          = 5;
  float  bbox_h          = 6;
  float  crossing_ratio  = 7; // 가상 통과선과의 교차 비율 0~1
}

message GpsPoint {
  double latitude   = 1;
  double longitude  = 2;
  double speed_kmh  = 3;
  double heading    = 4;
  google.protobuf.Timestamp captured_at = 5;
}

enum VehicleType {
  VEHICLE_UNKNOWN = 0;
  PASSENGER       = 1; // 승용
  VAN             = 2; // 승합
  TRUCK           = 3; // 화물
  BUS             = 4; // 버스
  SPECIAL         = 5; // 특수
  MOTORCYCLE      = 6;
}

enum CrossingDirection {
  DIRECTION_UNKNOWN = 0;
  ENTRY = 1;          // 진입 (요금 시작)
  EXIT  = 2;          // 진출 (요금 정산)
}

// ---------------- 응답 ----------------
message PassageEventResponse {
  string event_id        = 1;
  bool   accepted        = 2;
  ProcessingStatus status = 3;
  string message         = 4;
}

enum ProcessingStatus {
  STATUS_UNKNOWN = 0;
  STORED         = 1; // 정상 저장
  PENDING_REVIEW = 2; // 저신뢰도 → 수동 검수 큐
  DUPLICATED     = 3; // 멱등성 키 중복
  REJECTED       = 4; // 검증 실패
}

// ---------------- 헬스체크 ----------------
message HeartbeatRequest {
  string edge_node_id = 1;
  google.protobuf.Timestamp sent_at = 2;
  uint64 queued_events = 3;
  float  cpu_load = 4;
  float  gpu_load = 5;
}

message HeartbeatResponse {
  bool   ok = 1;
  google.protobuf.Timestamp server_time = 2;
}
